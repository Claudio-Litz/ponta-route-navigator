<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Missões - Vale</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header-content {
            flex: 1;
            min-width: 250px;
        }

        .header-content h1 {
            color: #1a1a1a;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header-content p {
            color: #666;
            font-size: 14px;
        }

        .upload-section {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: -9999px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #0066cc;
            color: white;
        }

        .btn-primary:hover {
            background: #0052a3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 102, 204, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #0066cc;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #0066cc;
        }

        .stat-card.warning {
            border-left-color: #ff9800;
        }

        .stat-card.warning .stat-value {
            color: #ff9800;
        }

        .stat-card.success {
            border-left-color: #22c55e;
        }

        .stat-card.success .stat-value {
            color: #22c55e;
        }

        .missions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .mission-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .mission-card:hover {
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
            transform: translateY(-4px);
        }

        .card-header {
            background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
        }

        .card-header-content {
            flex: 1;
        }

        .card-header-content h3 {
            font-size: 18px;
            margin-bottom: 5px;
            word-break: break-word;
            font-weight: 600;
        }

        .card-header-content p {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .vehicle-type-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .priority-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .priority-high {
            background: #ff6b6b;
            color: white;
        }

        .priority-medium {
            background: #ffd93d;
            color: #333;
        }

        .priority-low {
            background: #6bcf7f;
            color: white;
        }

        .card-body {
            padding: 20px;
            flex: 1;
        }

        .section-title {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            margin-top: 15px;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 15px;
            color: #1a1a1a;
            font-weight: 600;
        }

        .info-value.secondary {
            font-size: 13px;
            color: #666;
            font-weight: 400;
        }

        .route-section {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            margin: 15px 0;
        }

        .route-title {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .route-steps {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .route-step {
            background: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            color: #0066cc;
            font-weight: 600;
            border: 1px solid #e0e0e0;
            white-space: nowrap;
        }

        .route-arrow {
            color: #999;
            font-size: 14px;
            font-weight: bold;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .metric-box {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid #0066cc;
            text-align: center;
        }

        .metric-box.warning {
            border-left-color: #ff9800;
        }

        .metric-box.success {
            border-left-color: #22c55e;
        }

        .metric-label {
            font-size: 10px;
            color: #999;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 16px;
            font-weight: 700;
            color: #0066cc;
        }

        .metric-box.warning .metric-value {
            color: #ff9800;
        }

        .metric-box.success .metric-value {
            color: #22c55e;
        }

        .card-footer {
            background: #f8f9fa;
            padding: 15px 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .timestamp {
            font-size: 11px;
            color: #999;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #999;
            grid-column: 1 / -1;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state h2 {
            font-size: 22px;
            color: #666;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .empty-state p {
            font-size: 14px;
            color: #999;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            background: #22c55e;
            color: white;
        }

        .status-badge.completed {
            background: #22c55e;
        }

        @media (max-width: 1024px) {
            .missions-grid {
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            }
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
            }

            .upload-section {
                width: 100%;
                flex-direction: column;
            }

            .upload-section .btn {
                width: 100%;
                justify-content: center;
            }

            .missions-grid {
                grid-template-columns: 1fr;
            }

            .stats-container {
                grid-template-columns: 1fr;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            .metrics-grid {
                grid-template-columns: 1fr;
            }

            .card-header {
                flex-direction: column;
            }

            .card-footer {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>📊 Dashboard de Missões</h1>
                <p>Porto de Ponta da Madeira - Vale | Roteirização em Tempo Real</p>
            </div>
            <div class="upload-section">
                <div class="file-input-wrapper">
                    <input type="file" id="fileInput" accept=".json" multiple>
                    <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
                        📁 Importar JSON
                    </button>
                </div>
                <button class="btn btn-secondary" onclick="limparDados()">🗑️ Limpar Tudo</button>
            </div>
        </header>

        <div class="stats-container" id="statsContainer">
            <div class="stat-card">
                <div class="stat-label">Total de Missões</div>
                <div class="stat-value" id="totalMissoes">0</div>
            </div>
            <div class="stat-card success">
                <div class="stat-label">Tempo Total Gasto</div>
                <div class="stat-value" id="tempoTotal">0s</div>
            </div>
            <div class="stat-card warning">
                <div class="stat-label">Desvio Médio</div>
                <div class="stat-value" id="desviomedio">0s</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Eficiência Média</div>
                <div class="stat-value" id="eficiencia">100%</div>
            </div>
        </div>

        <div id="missionsContainer" class="missions-grid">
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                    <polyline points="13 2 13 9 20 9"></polyline>
                </svg>
                <h2>Nenhuma missão importada</h2>
                <p>Clique em "Importar JSON" para começar a visualizar os dados de missões</p>
            </div>
        </div>
    </div>

    <script>
        let missoes = [];

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        const json = JSON.parse(event.target.result);
                        if (json.relatorio_missao) {
                            missoes.push(json.relatorio_missao);
                        }
                    } catch (error) {
                        alert('Erro ao processar arquivo: ' + file.name);
                    }
                };
                reader.readAsText(file);
            });

            setTimeout(() => {
                renderizarMissoes();
                atualizarEstatisticas();
                e.target.value = '';
            }, 500);
        });

        function calcularEficiencia(missao) {
            if (!missao.duracao_real_s || !missao.duracao_prevista_s) return 100;
            if (missao.duracao_prevista_s === 0) return 100;
            const eficiencia = (missao.duracao_prevista_s / missao.duracao_real_s) * 100;
            return Math.round(Math.min(eficiencia, 100));
        }

        function renderizarMissoes() {
            const container = document.getElementById('missionsContainer');
            
            if (missoes.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                            <polyline points="13 2 13 9 20 9"></polyline>
                        </svg>
                        <h2>Nenhuma missão importada</h2>
                        <p>Clique em "Importar JSON" para começar a visualizar os dados de missões</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = missoes.map((missao, index) => {
                const prioridade = missao.prioridade.toLowerCase();
                const classPrioridade = `priority-${prioridade}`;
                const rota = missao.rota_completa || [];
                const rotaHtml = rota.map((step, i) => {
                    let html = `<span class="route-step">${step.name}</span>`;
                    if (i < rota.length - 1) {
                        html += '<span class="route-arrow">→</span>';
                    }
                    return html;
                }).join('');

                const dataGerada = new Date(missao.gerado_em).toLocaleString('pt-BR');
                const eficiencia = calcularEficiencia(missao);
                const desvioClass = missao.desvio_s > 0 ? 'warning' : 'success';

                return `
                    <div class="mission-card">
                        <div class="card-header">
                            <div class="card-header-content">
                                <h3>${missao.veiculo_nome}</h3>
                                <p>ID: ${missao.missao_id.substring(0, 8)}...</p>
                                <span class="vehicle-type-badge">${missao.tipo_veiculo}</span>
                            </div>
                            <span class="priority-badge ${classPrioridade}">${prioridade}</span>
                        </div>
                        <div class="card-body">
                            <div class="section-title">Localização</div>
                            <div class="info-grid">
                                <div class="info-item">
                                    <div class="info-label">Origem</div>
                                    <div class="info-value">${missao.local_inicio}</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">Destino</div>
                                    <div class="info-value">${missao.destino}</div>
                                </div>
                            </div>

                            <div class="section-title">Horários (Tempo Simulado)</div>
                            <div class="info-grid">
                                <div class="info-item">
                                    <div class="info-label">Início</div>
                                    <div class="info-value">${missao.horario_inicio}</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">Fim</div>
                                    <div class="info-value">${missao.horario_fim}</div>
                                </div>
                            </div>

                            <div class="route-section">
                                <div class="route-title">Rota Completa (${missao.total_nos} pontos)</div>
                                <div class="route-steps">${rotaHtml}</div>
                            </div>

                            <div class="section-title">Análise de Desempenho</div>
                            <div class="metrics-grid">
                                <div class="metric-box">
                                    <div class="metric-label">Duração Real</div>
                                    <div class="metric-value">${missao.duracao_real_s}s</div>
                                </div>
                                <div class="metric-box">
                                    <div class="metric-label">Duração Prevista</div>
                                    <div class="metric-value">${missao.duracao_prevista_s}s</div>
                                </div>
                                <div class="metric-box ${desvioClass}">
                                    <div class="metric-label">Desvio</div>
                                    <div class="metric-value">${missao.desvio_s > 0 ? '+' : ''}${missao.desvio_s}s</div>
                                </div>
                            </div>

                            <div class="metrics-grid">
                                <div class="metric-box" style="grid-column: 1 / -1;">
                                    <div class="metric-label">Eficiência</div>
                                    <div class="metric-value">${eficiencia}%</div>
                                </div>
                            </div>
                        </div>
                        <div class="card-footer">
                            <span class="timestamp">${dataGerada}</span>
                            <div style="display: flex; gap: 8px;">
                                <span class="status-badge completed">✓ Concluído</span>
                                <button class="btn btn-danger" onclick="removerMissao(${index})">Remover</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function atualizarEstatisticas() {
            const total = missoes.length;
            const tempoTotal = missoes.reduce((acc, m) => acc + (m.duracao_real_s || 0), 0);
            const desviomedio = total > 0 ? Math.round(missoes.reduce((acc, m) => acc + Math.abs(m.desvio_s || 0), 0) / total) : 0;
            const eficienciaMedia = total > 0 ? Math.round(missoes.reduce((acc, m) => acc + calcularEficiencia(m), 0) / total) : 100;

            document.getElementById('totalMissoes').textContent = total;
            document.getElementById('tempoTotal').textContent = tempoTotal + 's';
            document.getElementById('desviomedio').textContent = desviomedio + 's';
            document.getElementById('eficiencia').textContent = eficienciaMedia + '%';
        }

        function removerMissao(index) {
            missoes.splice(index, 1);
            renderizarMissoes();
            atualizarEstatisticas();
        }

        function limparDados() {
            if (confirm('Tem certeza que deseja limpar todas as missões?')) {
                missoes = [];
                renderizarMissoes();
                atualizarEstatisticas();
            }
        }
    </script>
</body>
</html>
